version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens
      POSTGRES_DB: civiclens
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U civiclens']
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    env_file: ./ai-service/.env
    ports:
      - '8000:8000'

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://civiclens:civiclens@postgres:5432/civiclens
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pgdata:
