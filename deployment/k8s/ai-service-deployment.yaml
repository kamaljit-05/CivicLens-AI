apiVersion: apps/v1
kind: Deployment
metadata:
  name: civiclens-ai-service
spec:
  replicas: 2
  selector:
    matchLabels: { app: civiclens-ai-service }
  template:
    metadata:
      labels: { app: civiclens-ai-service }
    spec:
      containers:
        - name: ai-service
          image: your-registry/civiclens-ai-service:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: civiclens-ai-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: civiclens-ai-service
spec:
  selector: { app: civiclens-ai-service }
  ports: [{ port: 8000, targetPort: 8000 }]
